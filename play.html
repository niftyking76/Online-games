<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Play Game</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Roboto', sans-serif;
  background: #e6d8a8;
}

/* TOP BAR */
.topbar {
  background: #ff3b8d;
  color: white;
  padding: 10px;
  font-weight: bold;
}

/* MAIN LAYOUT */
.container {
  display: grid;
  grid-template-columns: 80px 1fr 80px;
  gap: 10px;
  padding: 10px;
}

/* SIDE GAME LIST */
.side {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.side img {
  width: 100%;
  border-radius: 10px;
  cursor: pointer;
}

/* GAME PLAYER */
.player {
  background: black;
  border-radius: 10px;
  overflow: hidden;
  position: relative;
}

.player iframe {
  width: 100%;
  height: 500px;
  border: none;
}

/* MORE GAMES */
.more-games {
  padding: 10px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
  gap: 10px;
}

.card {
  background: white;
  border-radius: 10px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* ADS BOX */
.ad-box {
  background: #ddd;
  text-align: center;
  padding: 20px;
  border-radius: 10px;
  font-size: 14px;
  color: #555;
}

/* MOBILE */
@media (max-width: 768px) {
  .container {
    grid-template-columns: 1fr;
  }

  .side {
    flex-direction: row;
    overflow-x: auto;
  }

  .player iframe {
    height: 300px;
  }
}
</style>
</head>

<body>

<div class="topbar">🎮 Game Player</div>

<div class="container">

  <!-- LEFT SIDE -->
  <div class="side">
    <img src="https://via.placeholder.com/80">
    <img src="https://via.placeholder.com/80">
    <img src="https://via.placeholder.com/80">
  </div>

  <!-- GAME PLAYER -->
  <div class="player">
    <iframe 
      src="https://html5.gamedistribution.com/22c23c982349439294e9a3d0d55b7a76/?gd_sdk_referrer_url=https://www.example.com/games/test"
      allowfullscreen>
    </iframe>
  </div>

  <!-- RIGHT SIDE -->
  <div class="side">
    <img src="https://via.placeholder.com/80">
    <img src="https://via.placeholder.com/80">
    <img src="https://via.placeholder.com/80">
  </div>

</div>

<!-- BELOW PLAYER -->
<div class="more-games">

  <!-- AD -->
  <div class="ad-box">ADVERTISEMENT</div>

  <!-- GAME GRID -->
  <div class="grid">
    <div class="card"><img src="https://via.placeholder.com/100"></div>
    <div class="card"><img src="https://via.placeholder.com/100"></div>
    <div class="card"><img src="https://via.placeholder.com/100"></div>
    <div class="card"><img src="https://via.placeholder.com/100"></div>
    <div class="card"><img src="https://via.placeholder.com/100"></div>
  </div>

</div>

</body>
</html>
